name: frontend-ci

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    name: Test / shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        shardTotal: [4]
    defaults:
      run:
        shell: bash
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend

      - name: Run tests
        run: pnpm vitest run --shard=${{ matrix.shard }}/${{ matrix.shardTotal }}

  build:
    name: Build & Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend

      - name: Build frontend
        run: pnpm build-only

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: aries-dist
          path: dist
          if-no-files-found: error
