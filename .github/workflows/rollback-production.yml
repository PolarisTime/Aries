name: frontend-production-rollback
run-name: "frontend rollback: ${{ inputs.target_release }} / target=${{ inputs.deploy_target }}"

on:
  workflow_dispatch:
    inputs:
      target_release:
        description: "Frontend release id to roll back to, or previous"
        required: true
        default: "previous"
        type: string
      deploy_target:
        description: "Production rollback target"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - ssh

permissions:
  contents: read

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: false

jobs:
  rollback-local:
    name: Rollback Frontend Local
    if: ${{ inputs.deploy_target == 'local' }}
    runs-on:
      - self-hosted
      - linux
      - steelx-production
    environment: production
    defaults:
      run:
        shell: bash
    env:
      PROD_FRONTEND_ROOT: ${{ vars.PROD_FRONTEND_ROOT || '/instance/steelx/frontend' }}
    steps:
      - name: Checkout Aries deploy scripts
        uses: actions/checkout@v4

      - name: Roll back frontend release
        run: |
          set -euo pipefail
          bash scripts/deploy/rollback-frontend-release.sh \
            --target-release "${{ inputs.target_release }}" \
            --frontend-root "$PROD_FRONTEND_ROOT"

  rollback-ssh:
    name: Rollback Frontend SSH
    if: ${{ inputs.deploy_target == 'ssh' }}
    runs-on:
      - self-hosted
      - linux
      - steelx-production
    environment: production
    defaults:
      run:
        shell: bash
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
      PROD_FRONTEND_ROOT: ${{ vars.PROD_FRONTEND_ROOT || '/instance/steelx/frontend' }}
    steps:
      - name: Checkout Aries deploy scripts
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST secret}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER secret}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY secret}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/aries-production"
          chmod 600 "$HOME/.ssh/aries-production"
          if [[ -n "$PROD_SSH_KNOWN_HOSTS" ]]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "$PROD_SSH_PORT" "$PROD_SSH_HOST" > "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Roll back frontend release
        run: |
          set -euo pipefail
          quote() { printf '%q' "$1"; }
          remote_command="sudo bash -s --"
          remote_command+=" --target-release $(quote "${{ inputs.target_release }}")"
          remote_command+=" --frontend-root $(quote "$PROD_FRONTEND_ROOT")"
          ssh -i "$HOME/.ssh/aries-production" \
            -p "$PROD_SSH_PORT" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "$remote_command" < scripts/deploy/rollback-frontend-release.sh
